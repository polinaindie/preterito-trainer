<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Español — Тренажери граматики</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Manrope:wght@300;400;500;600;700;800&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-cream: #f4ead5;
    --bg-paper: #ede0c0;
    --ink: #2a1810;
    --ink-soft: #5c3a28;
    --terracotta: #c44536;
    --terracotta-deep: #9a2f24;
    --ochre: #d4882b;
    --olive: #6b6f3d;
    --wine: #722f37;
    --gold: #b8862a;
    --shadow: rgba(42, 24, 16, 0.15);
    --shadow-deep: rgba(42, 24, 16, 0.35);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: var(--bg-cream); color: var(--ink); font-family: 'Manrope', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body {
    background-image:
      radial-gradient(ellipse at top left, rgba(196, 69, 54, 0.08), transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(212, 136, 43, 0.08), transparent 50%),
      url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.16 0 0 0 0 0.09 0 0 0 0 0.06 0 0 0 0.08 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    background-attachment: fixed;
  }
  .ornament { position: fixed; pointer-events: none; z-index: 0; opacity: 0.12; }
  .ornament-1 { top: 40px; left: 40px; width: 120px; }
  .ornament-2 { top: 40px; right: 40px; width: 120px; transform: scaleX(-1); }
  .ornament-3 { bottom: 40px; left: 40px; width: 100px; transform: rotate(180deg) scaleX(-1); }
  .ornament-4 { bottom: 40px; right: 40px; width: 100px; transform: rotate(180deg); }
  .container { max-width: 1200px; margin: 0 auto; padding: 50px 32px 80px; position: relative; z-index: 1; }

  header { text-align: center; margin-bottom: 40px; position: relative; padding-top: 8px; }
  .eyebrow { font-family: 'Caveat', cursive; font-size: 1.4rem; color: var(--terracotta); letter-spacing: 2px; margin-bottom: 8px; transform: rotate(-2deg); display: inline-block; }
  h1 { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: clamp(2.2rem, 6vw, 4.2rem); line-height: 0.95; color: var(--ink); letter-spacing: -0.02em; margin-bottom: 12px; }
  h1 .accent { font-style: italic; color: var(--terracotta); font-weight: 500; }
  h1 .accent::before, h1 .accent::after { content: '·'; color: var(--gold); margin: 0 0.3em; font-style: normal; }
  .subtitle { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.15rem; color: var(--ink-soft); max-width: 600px; margin: 0 auto; line-height: 1.5; }
  .divider { display: flex; align-items: center; justify-content: center; gap: 12px; margin: 20px auto; color: var(--gold); }
  .divider::before, .divider::after { content: ''; width: 60px; height: 1px; background: var(--gold); }
  .divider svg { width: 16px; height: 16px; }

  .top-controls { position: absolute; top: 0; right: 0; display: flex; gap: 8px; align-items: flex-end; flex-direction: column; }
  .back-btn, .sound-toggle { background: transparent; border: 1.5px solid var(--ink); color: var(--ink); padding: 8px 16px; border-radius: 100px; font-family: 'Manrope', sans-serif; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s ease; }
  .back-btn:hover, .sound-toggle:hover { background: var(--ink); color: var(--bg-cream); }
  .sound-toggle.muted { opacity: 0.5; }
  .sound-toggle svg { width: 14px; height: 14px; }
  .voice-status { font-family: 'Manrope', sans-serif; font-size: 0.7rem; color: var(--ink-soft); letter-spacing: 0.05em; max-width: 260px; text-align: right; }

  .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 24px; }
  .menu-card { background: var(--bg-paper); border: 1px solid rgba(184, 134, 42, 0.3); border-radius: 6px; padding: 28px 24px; cursor: pointer; transition: all 0.3s ease; position: relative; overflow: hidden; box-shadow: 0 4px 16px -4px var(--shadow); display: flex; flex-direction: column; gap: 12px; min-height: 220px; }
  .menu-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px -8px var(--shadow-deep); border-color: var(--terracotta); }
  .menu-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: var(--accent-color, var(--terracotta)); }
  .menu-card-level { font-family: 'Caveat', cursive; font-size: 1rem; color: var(--ink-soft); text-transform: uppercase; letter-spacing: 0.1em; }
  .menu-card-title { font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; font-weight: 600; color: var(--ink); line-height: 1.1; }
  .menu-card-title .it { font-style: italic; color: var(--accent-color, var(--terracotta)); }
  .menu-card-desc { font-family: 'Manrope', sans-serif; font-size: 0.85rem; color: var(--ink-soft); line-height: 1.5; flex: 1; }
  .menu-card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 12px; border-top: 1px dashed rgba(184, 134, 42, 0.4); }
  .menu-card-tag { font-family: 'Manrope', sans-serif; font-size: 0.7rem; color: var(--ink-soft); letter-spacing: 0.1em; text-transform: uppercase; }
  .menu-card-arrow { color: var(--accent-color, var(--terracotta)); font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; }

  .tabs { display: flex; justify-content: center; gap: 0; margin-bottom: 32px; flex-wrap: wrap; background: var(--bg-paper); border-radius: 4px; padding: 6px; max-width: 600px; margin-left: auto; margin-right: auto; box-shadow: inset 0 1px 3px var(--shadow); border: 1px solid rgba(184, 134, 42, 0.2); }
  .tab { flex: 1; min-width: 100px; padding: 12px 18px; background: transparent; border: none; font-family: 'Manrope', sans-serif; font-weight: 600; font-size: 0.85rem; color: var(--ink-soft); cursor: pointer; border-radius: 2px; transition: all 0.3s ease; letter-spacing: 0.05em; text-transform: uppercase; }
  .tab:hover { color: var(--ink); }
  .tab.active { background: var(--ink); color: var(--bg-cream); box-shadow: 0 2px 8px var(--shadow-deep); }

  .content { background: var(--bg-paper); border-radius: 6px; padding: 40px; box-shadow: 0 1px 0 rgba(255, 255, 255, 0.6) inset, 0 20px 60px -20px var(--shadow-deep), 0 4px 16px -4px var(--shadow); border: 1px solid rgba(184, 134, 42, 0.25); position: relative; min-height: 500px; }
  .content::before { content: ''; position: absolute; inset: 8px; border: 1px solid rgba(184, 134, 42, 0.2); border-radius: 3px; pointer-events: none; }
  .panel { display: none; }
  .panel.active { display: block; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .screen { display: none; }
  .screen.active { display: block; animation: fadeIn 0.4s ease; }

  .verb-selector { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px; justify-content: center; }
  .verb-chip { padding: 8px 18px; background: transparent; border: 1.5px solid var(--ink); border-radius: 100px; font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.05rem; color: var(--ink); cursor: pointer; transition: all 0.25s ease; font-weight: 500; }
  .verb-chip:hover { background: var(--ink); color: var(--bg-cream); transform: translateY(-2px); }
  .verb-chip.active { background: var(--terracotta); border-color: var(--terracotta); color: var(--bg-cream); }

  .verb-card { background: linear-gradient(135deg, rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0)); border-radius: 4px; padding: 32px; margin-bottom: 24px; border: 1px solid rgba(184, 134, 42, 0.3); }
  .verb-header { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 12px; border-bottom: 1px solid rgba(184, 134, 42, 0.4); padding-bottom: 16px; margin-bottom: 24px; }
  .verb-title { font-family: 'Cormorant Garamond', serif; font-size: 2.8rem; font-weight: 600; color: var(--ink); line-height: 1; }
  .verb-translation { font-family: 'Caveat', cursive; font-size: 1.5rem; color: var(--terracotta); }
  .verb-stem { display: inline-block; background: var(--ink); color: var(--bg-cream); padding: 4px 14px; border-radius: 100px; font-family: 'Manrope', sans-serif; font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600; margin-bottom: 24px; }

  .conjugation-table { display: grid; grid-template-columns: 1fr 1fr; gap: 0; margin-top: 16px; }
  .conj-row { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 12px; padding: 12px 14px; border-bottom: 1px dashed rgba(184, 134, 42, 0.4); transition: background 0.2s ease; }
  .conj-row:hover { background: rgba(196, 69, 54, 0.06); }
  .conj-row:nth-last-child(-n+2) { border-bottom: none; }
  .conj-row:nth-child(odd) { border-right: 1px dashed rgba(184, 134, 42, 0.4); }
  .pronoun { font-family: 'Cormorant Garamond', serif; font-style: italic; color: var(--ink-soft); font-size: 1rem; }
  .conjugated { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 1.35rem; color: var(--ink); text-align: right; }
  .conjugated .ending { color: var(--terracotta); }
  .verb-note { margin-top: 20px; padding: 16px 20px; background: rgba(212, 136, 43, 0.12); border-left: 3px solid var(--ochre); border-radius: 2px; font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1rem; color: var(--ink-soft); line-height: 1.5; }

  .speaker-btn { background: transparent; border: 1.5px solid var(--ink-soft); color: var(--ink-soft); width: 32px; height: 32px; border-radius: 50%; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; transition: all 0.2s ease; padding: 0; flex-shrink: 0; }
  .speaker-btn:hover { background: var(--terracotta); border-color: var(--terracotta); color: var(--bg-cream); transform: scale(1.08); }
  .speaker-btn:active { transform: scale(0.95); }
  .speaker-btn.playing { background: var(--terracotta); border-color: var(--terracotta); color: var(--bg-cream); animation: pulse 0.8s ease-in-out infinite; }
  .speaker-btn svg { width: 16px; height: 16px; }
  .speaker-btn-large { width: 44px; height: 44px; }
  .speaker-btn-large svg { width: 22px; height: 22px; }
  .conj-row .speaker-btn { width: 26px; height: 26px; border-width: 1px; }
  .conj-row .speaker-btn svg { width: 12px; height: 12px; }
  @keyframes pulse { 0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(196, 69, 54, 0.5); } 50% { transform: scale(1.06); box-shadow: 0 0 0 8px rgba(196, 69, 54, 0); } }

  .practice-setup { text-align: center; margin-bottom: 24px; }
  .practice-setup h2 { font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: 1.9rem; color: var(--ink); margin-bottom: 12px; }
  .filter-group { margin-bottom: 22px; }
  .filter-label { font-family: 'Caveat', cursive; font-size: 1.2rem; color: var(--terracotta); margin-bottom: 8px; display: block; }
  .filter-options { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
  .filter-option { padding: 6px 14px; background: transparent; border: 1.5px solid var(--ink-soft); border-radius: 4px; font-family: 'Manrope', sans-serif; font-size: 0.85rem; font-weight: 500; color: var(--ink-soft); cursor: pointer; transition: all 0.2s ease; }
  .filter-option:hover { border-color: var(--ink); color: var(--ink); }
  .filter-option.active { background: var(--wine); border-color: var(--wine); color: var(--bg-cream); }
  .start-btn { margin-top: 20px; padding: 14px 40px; background: var(--terracotta); color: var(--bg-cream); border: none; border-radius: 100px; font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 0.9rem; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; box-shadow: 0 4px 16px rgba(196, 69, 54, 0.3); transition: all 0.3s ease; }
  .start-btn:hover { background: var(--terracotta-deep); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(196, 69, 54, 0.4); }

  .quiz-card { text-align: center; padding: 16px 0; }
  .review-badge { display: inline-block; padding: 4px 12px; background: var(--ochre); color: var(--bg-cream); border-radius: 100px; font-family: 'Manrope', sans-serif; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700; margin-bottom: 12px; }
  .quiz-progress { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; font-family: 'Caveat', cursive; font-size: 1.3rem; color: var(--ink-soft); }
  .progress-bar { flex: 1; height: 4px; background: rgba(184, 134, 42, 0.2); margin: 0 16px; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--ochre), var(--terracotta)); border-radius: 2px; transition: width 0.5s ease; }
  .quiz-prompt { font-family: 'Cormorant Garamond', serif; font-style: italic; color: var(--ink-soft); font-size: 1.1rem; margin-bottom: 8px; }
  .quiz-verb-row { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 4px; flex-wrap: wrap; }
  .quiz-verb { font-family: 'Cormorant Garamond', serif; font-size: 3.5rem; font-weight: 600; color: var(--ink); line-height: 1; }
  .quiz-meaning { font-family: 'Caveat', cursive; font-size: 1.4rem; color: var(--terracotta); margin-bottom: 22px; }
  .quiz-pronoun { display: inline-block; padding: 8px 24px; background: var(--ink); color: var(--bg-cream); border-radius: 4px; font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.5rem; margin-bottom: 28px; }
  .quiz-sentence { font-family: 'Cormorant Garamond', serif; font-size: 1.7rem; line-height: 1.5; color: var(--ink); margin: 20px auto; max-width: 600px; text-align: center; }
  .quiz-sentence .blank { display: inline-block; border-bottom: 2px solid var(--terracotta); min-width: 120px; padding: 0 8px; color: var(--terracotta); font-weight: 600; }
  .quiz-sentence .infinitive-hint { font-style: italic; color: var(--ink-soft); font-size: 0.9em; }
  .quiz-hint { font-family: 'Caveat', cursive; font-size: 1.2rem; color: var(--ink-soft); margin: 12px 0 18px; }
  .quiz-input { width: 100%; max-width: 400px; padding: 14px 20px; background: var(--bg-cream); border: 2px solid var(--ink-soft); border-radius: 4px; font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; color: var(--ink); text-align: center; outline: none; transition: all 0.2s ease; }
  .quiz-input:focus { border-color: var(--terracotta); box-shadow: 0 0 0 4px rgba(196, 69, 54, 0.1); }
  .quiz-input.correct { border-color: var(--olive); background: rgba(107, 111, 61, 0.1); }
  .quiz-input.incorrect { border-color: var(--terracotta-deep); background: rgba(196, 69, 54, 0.1); animation: shake 0.4s ease; }
  @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

  .choice-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; max-width: 600px; margin: 20px auto; }
  .choice-btn { padding: 14px 18px; background: var(--bg-cream); border: 2px solid var(--ink-soft); border-radius: 4px; font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 600; color: var(--ink); cursor: pointer; transition: all 0.2s ease; }
  .choice-btn:hover:not(:disabled) { background: var(--ink); color: var(--bg-cream); border-color: var(--ink); transform: translateY(-2px); }
  .choice-btn.correct { background: var(--olive); border-color: var(--olive); color: var(--bg-cream); }
  .choice-btn.incorrect { background: var(--terracotta-deep); border-color: var(--terracotta-deep); color: var(--bg-cream); animation: shake 0.4s ease; }
  .choice-btn:disabled { cursor: not-allowed; opacity: 0.85; }

  .quiz-feedback { margin-top: 20px; min-height: 60px; font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; font-style: italic; }
  .quiz-feedback.correct { color: var(--olive); }
  .quiz-feedback.incorrect { color: var(--terracotta-deep); }
  .quiz-feedback strong { font-weight: 700; font-style: normal; }
  .quiz-actions { display: flex; justify-content: center; gap: 12px; margin-top: 24px; flex-wrap: wrap; }
  .btn { padding: 10px 24px; border: 2px solid var(--ink); background: transparent; color: var(--ink); border-radius: 100px; font-family: 'Manrope', sans-serif; font-weight: 600; font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.2s ease; }
  .btn:hover { background: var(--ink); color: var(--bg-cream); }
  .btn-primary { background: var(--terracotta); border-color: var(--terracotta); color: var(--bg-cream); }
  .btn-primary:hover { background: var(--terracotta-deep); border-color: var(--terracotta-deep); color: var(--bg-cream); }

  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 28px; padding-top: 20px; border-top: 1px dashed rgba(184, 134, 42, 0.4); }
  .stat { text-align: center; }
  .stat-value { font-family: 'Cormorant Garamond', serif; font-size: 2.2rem; font-weight: 600; color: var(--ink); line-height: 1; }
  .stat-value.success { color: var(--olive); }
  .stat-value.error { color: var(--terracotta); }
  .stat-label { font-family: 'Caveat', cursive; font-size: 1.1rem; color: var(--ink-soft); margin-top: 4px; }

  .results { text-align: center; padding: 20px; }
  .results-emoji { font-size: 4rem; margin-bottom: 16px; }
  .results-title { font-family: 'Cormorant Garamond', serif; font-size: 2.3rem; font-weight: 600; color: var(--ink); margin-bottom: 8px; }
  .results-subtitle { font-family: 'Caveat', cursive; font-size: 1.4rem; color: var(--terracotta); margin-bottom: 28px; }
  .results-score { font-family: 'Cormorant Garamond', serif; font-size: 4.5rem; font-weight: 600; color: var(--terracotta); line-height: 1; }
  .results-score-label { font-family: 'Manrope', sans-serif; font-size: 0.85rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-soft); margin-top: 8px; margin-bottom: 28px; }

  .mistakes-preview { margin: 28px auto; max-width: 500px; padding: 18px 22px; background: rgba(212, 136, 43, 0.1); border: 1px dashed var(--ochre); border-radius: 4px; }
  .mistakes-title { font-family: 'Caveat', cursive; font-size: 1.3rem; color: var(--terracotta); margin-bottom: 10px; }
  .mistakes-chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .mistake-chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; background: var(--bg-cream); border: 1px solid rgba(184, 134, 42, 0.4); border-radius: 100px; font-family: 'Cormorant Garamond', serif; }
  .mc-pronoun { font-style: italic; color: var(--ink-soft); font-size: 0.9rem; }
  .mc-form { font-weight: 600; color: var(--terracotta-deep); font-size: 1rem; }
  .mistake-chip.more { color: var(--ink-soft); font-style: italic; font-family: 'Caveat', cursive; font-size: 1.1rem; }

  .reference-intro { text-align: center; margin-bottom: 36px; }
  .reference-intro h2 { font-family: 'Cormorant Garamond', serif; font-weight: 500; font-size: 2rem; color: var(--ink); margin-bottom: 8px; }
  .reference-intro p { font-family: 'Cormorant Garamond', serif; font-style: italic; color: var(--ink-soft); max-width: 700px; margin: 0 auto; line-height: 1.6; }
  .reference-section { margin-bottom: 36px; }
  .ref-section-title { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.5rem; color: var(--terracotta); margin-bottom: 14px; border-bottom: 1px solid rgba(184, 134, 42, 0.4); padding-bottom: 8px; }
  .ref-section-title .num { font-family: 'Caveat', cursive; font-style: normal; font-size: 1.8rem; color: var(--gold); margin-right: 8px; }
  .ref-text { font-family: 'Manrope', sans-serif; line-height: 1.7; color: var(--ink-soft); margin-bottom: 14px; }
  .ref-text strong { color: var(--ink); }
  .endings-table { width: 100%; border-collapse: collapse; margin: 14px 0; background: rgba(255, 255, 255, 0.3); }
  .endings-table th, .endings-table td { padding: 9px 13px; text-align: left; border: 1px solid rgba(184, 134, 42, 0.3); font-family: 'Cormorant Garamond', serif; }
  .endings-table th { background: var(--ink); color: var(--bg-cream); font-weight: 600; font-style: italic; }
  .endings-table td.ending { font-weight: 700; color: var(--terracotta); font-size: 1.05rem; }
  .example-box { background: rgba(255, 255, 255, 0.4); border-left: 3px solid var(--terracotta); padding: 14px 18px; margin: 10px 0; border-radius: 2px; }
  .example-box .es { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.15rem; color: var(--ink); margin-bottom: 4px; }
  .example-box .uk { font-family: 'Manrope', sans-serif; font-size: 0.85rem; color: var(--ink-soft); }
  .example-box .es b { color: var(--terracotta); font-weight: 700; font-style: normal; }

  footer { text-align: center; margin-top: 40px; font-family: 'Caveat', cursive; color: var(--ink-soft); font-size: 1.1rem; }
  footer .heart { color: var(--terracotta); }

  @media (max-width: 700px) {
    .container { padding: 30px 16px 50px; }
    .content { padding: 24px 16px; }
    .ornament { display: none; }
    .conjugation-table { grid-template-columns: 1fr; }
    .conj-row:nth-child(odd) { border-right: none; }

let soundEnabled = true;
let spanishVoice = null;
let voicesReady = false;

function loadVoices() {
  const voices = window.speechSynthesis.getVoices();
  if (voices.length === 0) return false;
  spanishVoice =
    voices.find(v => v.lang === 'es-ES' && /Mónica|Monica|Marisol|Lucia/i.test(v.name)) ||
    voices.find(v => v.lang === 'es-ES') ||
    voices.find(v => v.lang === 'es_ES') ||
    voices.find(v => v.lang.toLowerCase().startsWith('es-es')) ||
    voices.find(v => v.lang.toLowerCase().startsWith('es-mx')) ||
    voices.find(v => v.lang.toLowerCase().startsWith('es-')) ||
    voices.find(v => v.lang.toLowerCase().startsWith('es')) ||
    voices.find(v => /spanish|español/i.test(v.name));
  voicesReady = true;
  updateVoiceStatus();
  return !!spanishVoice;
}

function updateVoiceStatus() {
  const statusEl = document.getElementById('voiceStatus');
  if (!statusEl) return;
  if (spanishVoice) {
    statusEl.innerHTML = `🇪🇸 ${spanishVoice.name}`;
    statusEl.style.color = 'var(--olive)';
  } else {
    statusEl.innerHTML = `⚠️ Іспанський голос не знайдено`;
    statusEl.style.color = 'var(--terracotta-deep)';
  }
}

if ('speechSynthesis' in window) {
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
}

function speak(text, options = {}) {
  if (!soundEnabled) return;
  if (!('speechSynthesis' in window)) return;
  if (!voicesReady) loadVoices();
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text.trim());
  utterance.lang = 'es-ES';
  if (spanishVoice) utterance.voice = spanishVoice;
  utterance.rate = options.rate || 0.85;
  utterance.pitch = 1.0;
  utterance.volume = 1.0;
  if (options.onstart) utterance.onstart = options.onstart;
  if (options.onend) utterance.onend = options.onend;
  setTimeout(() => window.speechSynthesis.speak(utterance), 50);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function normalize(s) {
  return s.toLowerCase().trim()
    .replace(/á/g, 'a').replace(/é/g, 'e').replace(/í/g, 'i')
    .replace(/ó/g, 'o').replace(/ú/g, 'u').replace(/ñ/g, 'n');
}

function isCorrectAnswer(answer, expected) {
  if (answer.toLowerCase().trim() === expected.toLowerCase().trim()) return 'perfect';
  if (normalize(answer) === normalize(expected)) return 'no-accent';
  return 'wrong';
}

function pluralize(n, one, few, many) {
  const mod10 = n % 10;
  const mod100 = n % 100;
  if (mod10 === 1 && mod100 !== 11) return one;
  if (mod10 >= 2 && mod10 <= 4 && (mod100 < 10 || mod100 >= 20)) return few;
  return many;
}

function showMenu() {

function openTrainer(id) {
  const trainer = TRAINERS[id];
  if (!trainer) return;
  currentTrainer = trainer;
  document.getElementById('screen-menu').classList.remove('active');
  document.getElementById('screen-trainer').classList.add('active');
  document.getElementById('backBtn').style.display = 'inline-flex';
  document.getElementById('appTitle').innerHTML = trainer.title;
  document.getElementById('appSubtitle').textContent = trainer.subtitle;
  document.documentElement.style.setProperty('--accent-color', trainer.color);

  // Build tabs
  const tabsHtml = trainer.tabs.map((t, i) => `<button class="tab ${i === 0 ? 'active' : ''}" data-tab="${t.id}">${t.label}</button>`).join('');
  document.getElementById('tabsContainer').innerHTML = tabsHtml;
  document.querySelectorAll('#tabsContainer .tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('#tabsContainer .tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      trainer.render(t.dataset.tab);
    });
  });

  // Render first tab
  trainer.render(trainer.tabs[0].id);
  window.scrollTo(0, 0);
}

    showingFeedback: false,
    mistakes: [],

  quizState = {
    ...quizState,

    current: 0,
    correct: 0,
    incorrect: 0,
    showingFeedback: false,
    mistakes: [],

    reviewRound: quizState.reviewRound + 1

}

  'iy': 'Зміна i→y',
  'spelling': 'Орфографічні',
  'special': 'Унікальні'
};

function highlightForm(form) {
  const m = form.match(/(aron|asteis|ieron|isteis|imos|aste|iste|amos|eron|í|é|ó|i|o)$/);
  if (m) {
    const ending = m[0];
    const stem = form.slice(0, form.length - ending.length);
    return `${stem}<span class="ending">${ending}</span>`;
  }
  return form;
}

function startIndefinidoQuiz() {
  const groups = Array.from(document.querySelectorAll('#indGroupFilters .filter-option.active')).map(b => b.dataset.group);
  const persons = Array.from(document.querySelectorAll('#indPersonFilters .filter-option.active')).map(b => parseInt(b.dataset.person));
  if (groups.length === 0 || persons.length === 0) { alert('Обери хоча б одну групу та одну особу.'); return; }
  const filteredVerbs = INDEFINIDO_VERBS.filter(v => groups.includes(v.group));
  const questions = [];
  filteredVerbs.forEach(v => { persons.forEach(p => questions.push({ verb: v, person: p })); });
  initQuizState(questions);
  renderIndefinidoQuestion();
}

function renderIndefinidoQuestion() {
  const q = quizState.questions[quizState.current];
  const total = quizState.questions.length;
  const progress = (quizState.current / total) * 100;
  const root = document.getElementById('trainerContent');
  root.innerHTML = `
    <div class="quiz-card">
      ${quizState.reviewMode ? `<div class="review-badge">⟲ Раунд повторення ${quizState.reviewRound}</div>` : ''}
      <div class="quiz-progress">
        <span>${quizState.current + 1}/${total}</span>
        <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
        <span style="color:var(--olive);">✓ ${quizState.correct}</span>
      </div>
      <div class="quiz-prompt">провідміняй</div>
      <div class="quiz-verb-row">
        <div class="quiz-verb">${q.verb.inf}</div>
        <button class="speaker-btn speaker-btn-large" id="indQuizSpeaker">${SPEAKER_SVG}</button>
      </div>
      <div class="quiz-meaning">~ ${q.verb.meaning}</div>
      <div class="quiz-pronoun">${PRONOUNS[q.person]}</div>
      <div><input type="text" id="quizInput" class="quiz-input" placeholder="напиши форму..." autocomplete="off" autocapitalize="off" spellcheck="false"></div>
      <div class="quiz-feedback" id="quizFeedback"></div>
      <div class="quiz-actions" id="quizActions">
        <button class="btn btn-primary" id="checkBtn">Перевірити</button>
        <button class="btn" id="skipBtn">Не знаю</button>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-value success">${quizState.correct}</div><div class="stat-label">правильно</div></div>
        <div class="stat"><div class="stat-value error">${quizState.incorrect}</div><div class="stat-label">помилок</div></div>
        <div class="stat"><div class="stat-value">${total - quizState.current}</div><div class="stat-label">залишилось</div></div>
      </div>
    </div>
  `;
  const input = document.getElementById('quizInput');
  input.focus();
  const announce = `${q.verb.inf}... ${PRONOUNS_SPEAK[q.person]}`;
  const speaker = document.getElementById('indQuizSpeaker');
  attachSpeakHandler(speaker, announce);
  if (soundEnabled) {
    setTimeout(() => {
      speaker.classList.add('playing');
      speak(announce, { onend: () => speaker.classList.remove('playing') });
    }, voicesReady ? 200 : 500);
  }
  document.getElementById('checkBtn').addEventListener('click', () => checkIndefinidoAnswer());
  document.getElementById('skipBtn').addEventListener('click', () => skipIndefinidoAnswer());
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { if (quizState.showingFeedback) nextIndefinidoQuestion(); else checkIndefinidoAnswer(); }
  });
}

function checkIndefinidoAnswer() {
  if (quizState.showingFeedback) { nextIndefinidoQuestion(); return; }
  const q = quizState.questions[quizState.current];
  const expected = q.verb.forms[q.person];
  const input = document.getElementById('quizInput');
  const answer = input.value;
  if (!answer.trim()) return;
  const result = isCorrectAnswer(answer, expected);
  const feedback = document.getElementById('quizFeedback');
  quizState.showingFeedback = true;
  if (result === 'perfect') {
    quizState.correct++;
    input.classList.add('correct');
    feedback.className = 'quiz-feedback correct';
    feedback.innerHTML = `¡Perfecto! <strong>${expected}</strong> ✓`;
  } else if (result === 'no-accent') {
    quizState.correct++;
    input.classList.add('correct');
    feedback.className = 'quiz-feedback correct';
    feedback.innerHTML = `Майже! Правильно: <strong>${expected}</strong> — не забудь про наголос!`;
  } else {
    quizState.incorrect++;
    quizState.mistakes.push(q);
    input.classList.add('incorrect');
    feedback.className = 'quiz-feedback incorrect';
    feedback.innerHTML = `Правильно: <strong>${expected}</strong>. ${q.verb.note}`;
  }
  const speakText = `${PRONOUNS_SPEAK[q.person]} ${expected}`;
  setTimeout(() => speak(speakText, { rate: 0.8 }), 300);
  document.getElementById('quizActions').innerHTML = `<button class="btn btn-primary" id="nextBtn">${quizState.current + 1 >= total() ? 'Результат' : 'Далі →'}</button>`;
  document.getElementById('nextBtn').addEventListener('click', nextIndefinidoQuestion);
}

function total() { return quizState.questions.length; }

function skipIndefinidoAnswer() {
  const q = quizState.questions[quizState.current];
  const expected = q.verb.forms[q.person];
  quizState.incorrect++;
  quizState.mistakes.push(q);
  quizState.showingFeedback = true;
  const feedback = document.getElementById('quizFeedback');
  feedback.className = 'quiz-feedback incorrect';
  feedback.innerHTML = `Правильно: <strong>${expected}</strong>. ${q.verb.note}`;
  document.getElementById('quizInput').classList.add('incorrect');
  const speakText = `${PRONOUNS_SPEAK[q.person]} ${expected}`;
  setTimeout(() => speak(speakText, { rate: 0.8 }), 300);
  document.getElementById('quizActions').innerHTML = `<button class="btn btn-primary" id="nextBtn">${quizState.current + 1 >= total() ? 'Результат' : 'Далі →'}</button>`;
  document.getElementById('nextBtn').addEventListener('click', nextIndefinidoQuestion);
}

function nextIndefinidoQuestion() {
  quizState.current++;
  quizState.showingFeedback = false;
  if (quizState.current >= quizState.questions.length) showIndefinidoResults();
  else renderIndefinidoQuestion();
}

function showIndefinidoResults() {
  const totalQ = quizState.questions.length;
  const pct = Math.round((quizState.correct / totalQ) * 100);
  const hasMistakes = quizState.mistakes.length > 0;
  const isReview = quizState.reviewMode;
  let emoji, title, subtitle;
  if (isReview && !hasMistakes) { emoji = '🌹'; title = '¡Lo lograste!'; subtitle = 'Усі помилки виправлені — ти запам\'ятала їх назавжди'; }
  else if (isReview && hasMistakes) { emoji = '🔄'; title = `Раунд ${quizState.reviewRound}`; subtitle = `Ще ${quizState.mistakes.length} ${pluralize(quizState.mistakes.length, 'форма', 'форми', 'форм')} потребують уваги`; }
  else if (pct === 100) { emoji = '🌹'; title = '¡Magnífico!'; subtitle = 'Ти володієш цим часом досконало'; }
  else if (pct >= 80) { emoji = '✨'; title = '¡Muy bien!'; subtitle = 'Майже бездоганно — продовжуй!'; }
  else if (pct >= 60) { emoji = '🍷'; title = '¡Bien hecho!'; subtitle = 'Гарний результат, але є над чим попрацювати'; }
  else if (pct >= 40) { emoji = '📖'; title = 'Sigue practicando'; subtitle = 'Повернись до теорії та спробуй ще раз'; }
  else { emoji = '🌱'; title = 'Empieza de nuevo'; subtitle = 'Не здавайся!'; }
  let actions = hasMistakes
    ? `<button class="btn btn-primary" id="reviewBtn">${isReview ? `Повторити ще раз (${quizState.mistakes.length})` : `Заучити помилки (${quizState.mistakes.length}) →`}</button><button class="btn" id="restartBtn">Нова сесія</button>`
    : `<button class="btn btn-primary" id="restartBtn">Ще раз</button><button class="btn" id="backBtn2">Налаштування</button>`;
  let mistakesList = '';
  if (hasMistakes) {
    const unique = {};
    quizState.mistakes.forEach(m => { unique[`${m.verb.inf}-${m.person}`] = m; });
    const items = Object.values(unique).slice(0, 8);
    mistakesList = `
      <div class="mistakes-preview">
        <div class="mistakes-title">${isReview ? 'Залишилось закріпити:' : 'Над чим попрацюємо:'}</div>
        <div class="mistakes-chips">
          ${items.map(m => `<div class="mistake-chip"><span class="mc-pronoun">${PRONOUNS[m.person]}</span><span class="mc-form">${m.verb.forms[m.person]}</span></div>`).join('')}
          ${Object.values(unique).length > 8 ? `<div class="mistake-chip more">+ ${Object.values(unique).length - 8}</div>` : ''}
        </div>
      </div>`;
  }
  document.getElementById('trainerContent').innerHTML = `
    <div class="results">
      <div class="results-emoji">${emoji}</div>
      <div class="results-title">${title}</div>
      <div class="results-subtitle">${subtitle}</div>
      ${!isReview || (isReview && !hasMistakes) ? `<div class="results-score">${pct}%</div><div class="results-score-label">${quizState.correct} з ${totalQ} правильно${isReview ? ` · раунд ${quizState.reviewRound}` : ''}</div>` :
        `<div style="margin:24px 0;"><div style="font-family:'Cormorant Garamond',serif;font-size:3rem;font-weight:600;color:var(--olive);">${quizState.correct}<span style="color:var(--ink-soft);font-size:1.5rem;"> / ${totalQ}</span></div><div style="font-family:'Caveat',cursive;font-size:1.2rem;color:var(--ink-soft);margin-top:4px;">виправлено цього раунду</div></div>`}
      ${mistakesList}
      <div class="quiz-actions">${actions}</div>
    </div>`;
  if (hasMistakes) {
    document.getElementById('reviewBtn').addEventListener('click', () => startReviewQuiz(renderIndefinidoQuestion));
    document.getElementById('restartBtn').addEventListener('click', () => renderIndefinidoSetup(document.getElementById('trainerContent')));
  } else {
    document.getElementById('restartBtn').addEventListener('click', startIndefinidoQuiz);
    document.getElementById('backBtn2').addEventListener('click', () => renderIndefinidoSetup(document.getElementById('trainerContent')));
  }
}

  { inf: 'proponer', meaning: 'пропонувати', part: 'propuesto', regular: false, group: 'irregular', note: 'proponer → propuesto (як poner)' },
  { inf: 'imponer', meaning: 'нав\'язувати', part: 'impuesto', regular: false, group: 'irregular', note: 'imponer → impuesto (як poner)' },
  { inf: 'oponer', meaning: 'протиставляти', part: 'opuesto', regular: false, group: 'irregular', note: 'oponer → opuesto (як poner)' },
  { inf: 'deshacer', meaning: 'руйнувати, розв\'язувати', part: 'deshecho', regular: false, group: 'irregular', note: 'deshacer → deshecho (як hacer → hecho)' },
  { inf: 'rehacer', meaning: 'переробляти', part: 'rehecho', regular: false, group: 'irregular', note: 'rehacer → rehecho (як hacer)' },
  { inf: 'prever', meaning: 'передбачати', part: 'previsto', regular: false, group: 'irregular', note: 'prever → previsto (як ver → visto)' },
  { inf: 'revisar', meaning: 'перевіряти', part: 'revisado', regular: true, group: 'regular-ar', note: 'УВАГА: revisar — ПРАВИЛЬНЕ (revisado), не плутати з ver!' },
  { inf: 'describir', meaning: 'описувати', part: 'descrito', regular: false, group: 'irregular', note: 'describir → descrito (як escribir → escrito)' },
  { inf: 'inscribir', meaning: 'записувати, реєструвати', part: 'inscrito', regular: false, group: 'irregular', note: 'inscribir → inscrito (як escribir)' },
  { inf: 'freír', meaning: 'смажити', part: 'frito', regular: false, group: 'irregular', note: 'freír → frito (також можна freído, але frito поширеніше)' },
  { inf: 'imprimir', meaning: 'друкувати', part: 'impreso', regular: false, group: 'irregular', note: 'imprimir → impreso (також impreso vs imprimido — обидва ОК, impreso частіше)' },
  { inf: 'satisfacer', meaning: 'задовольняти', part: 'satisfecho', regular: false, group: 'irregular', note: 'satisfacer → satisfecho (як hacer → hecho)' },
];

const PERFECTO_GROUPS = {
  'regular-ar': 'Правильні -AR (→ -ado)',
  'regular-er-ir': 'Правильні -ER/-IR (→ -ido)',
  'irregular': 'Неправильні participios'
};

function getPerfectoForm(verb, person) {
  const haber = PERFECTO_HABER[person];
  return `${haber} ${verb.part}`;
}

function renderPerfectoTrainer(tab) {
  const root = document.getElementById('trainerContent');
  if (tab === 'explore') renderPerfectoExplore(root);
  else if (tab === 'practice') renderPerfectoSetup(root);
  else if (tab === 'reference') renderPerfectoReference(root);
}

function renderPerfectoExplore(root) {
  const chips = PERFECTO_VERBS.map((v, i) => `<button class="verb-chip ${i === 0 ? 'active' : ''}" data-idx="${i}">${v.inf}</button>`).join('');
  root.innerHTML = `<div class="verb-selector">${chips}</div><div id="perfVerbDisplay"></div>`;
  root.querySelectorAll('.verb-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      root.querySelectorAll('.verb-chip').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      renderPerfectoVerbCard(parseInt(btn.dataset.idx));
    });
  });
  renderPerfectoVerbCard(0);
}

function renderPerfectoVerbCard(idx) {
  const v = PERFECTO_VERBS[idx];
  const html = `
    <div class="verb-card">
      <div class="verb-header">
        <div>
          <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
            <div class="verb-title">${v.inf}</div>
            <button class="speaker-btn speaker-btn-large" data-speak="${v.inf}">${SPEAKER_SVG}</button>
          </div>
          <div class="verb-translation">~ ${v.meaning}</div>
        </div>
        <div class="verb-stem">${PERFECTO_GROUPS[v.group]}</div>
      </div>
      <div style="text-align:center;margin-bottom:20px;font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--ink-soft);">
        Participio: <span style="color:var(--terracotta);font-weight:600;font-style:normal;">${v.part}</span>
        <button class="speaker-btn" data-speak="${v.part}" style="margin-left:8px;vertical-align:middle;">${SPEAKER_SVG}</button>
      </div>
      <div class="conjugation-table">
        ${PERFECTO_HABER.map((h, i) => {
          const form = `${h} ${v.part}`;

        }).join('')}

      ${v.note ? `<div class="verb-note">✦ ${v.note}</div>` : `<div class="verb-note">✦ Правильне participio: -ar → -ado, -er/-ir → -ido</div>`}
    </div>
  `;
  document.getElementById('perfVerbDisplay').innerHTML = html;
  document.querySelectorAll('#perfVerbDisplay [data-speak]').forEach(btn => attachSpeakHandler(btn, btn.dataset.speak));
}

function renderPerfectoSetup(root) {
  root.innerHTML = `
    <div class="practice-setup">
      <h2>Налаштуй тренування</h2>
      <p style="font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--ink-soft);margin-bottom:20px;">Обери групи та особи.</p>
      <div class="filter-group">
        <span class="filter-label">~ групи дієслів ~</span>
        <div class="filter-options" id="perfGroupFilters">
          ${Object.entries(PERFECTO_GROUPS).map(([k, label]) => `<button class="filter-option active" data-group="${k}">${label}</button>`).join('')}
        </div>
      </div>
      <div class="filter-group">
        <span class="filter-label">~ особи ~</span>
        <div class="filter-options" id="perfPersonFilters">
          ${PRONOUNS.map((p, i) => `<button class="filter-option active" data-person="${i}">${p}</button>`).join('')}
        </div>
      </div>
      <button class="start-btn" id="perfStartBtn">Почати ¡Vamos!</button>
    </div>
  `;
  root.querySelectorAll('.filter-option').forEach(btn => btn.addEventListener('click', () => btn.classList.toggle('active')));
  document.getElementById('perfStartBtn').addEventListener('click', startPerfectoQuiz);
}

function startPerfectoQuiz() {
  const groups = Array.from(document.querySelectorAll('#perfGroupFilters .filter-option.active')).map(b => b.dataset.group);
  const persons = Array.from(document.querySelectorAll('#perfPersonFilters .filter-option.active')).map(b => parseInt(b.dataset.person));
  if (groups.length === 0 || persons.length === 0) { alert('Обери хоча б одну групу та одну особу.'); return; }
  const filtered = PERFECTO_VERBS.filter(v => groups.includes(v.group));
  const questions = [];
  filtered.forEach(v => { persons.forEach(p => questions.push({ verb: v, person: p, expected: getPerfectoForm(v, p) })); });
  initQuizState(questions);
  renderPerfectoQuestion();
}

function renderPerfectoQuestion() {
  const q = quizState.questions[quizState.current];
  const totalQ = quizState.questions.length;
  const progress = (quizState.current / totalQ) * 100;
  document.getElementById('trainerContent').innerHTML = `
    <div class="quiz-card">
      ${quizState.reviewMode ? `<div class="review-badge">⟲ Раунд повторення ${quizState.reviewRound}</div>` : ''}
      <div class="quiz-progress">
        <span>${quizState.current + 1}/${totalQ}</span>
        <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
        <span style="color:var(--olive);">✓ ${quizState.correct}</span>
      </div>
      <div class="quiz-prompt">провідміняй у Pretérito Perfecto</div>
      <div class="quiz-verb-row">
        <div class="quiz-verb">${q.verb.inf}</div>
        <button class="speaker-btn speaker-btn-large" id="perfQuizSpeaker">${SPEAKER_SVG}</button>
      </div>
      <div class="quiz-meaning">~ ${q.verb.meaning}</div>
      <div class="quiz-pronoun">${PRONOUNS[q.person]}</div>
      <div><input type="text" id="quizInput" class="quiz-input" placeholder="напр. he hablado..." autocomplete="off" autocapitalize="off" spellcheck="false"></div>
      <div class="quiz-feedback" id="quizFeedback"></div>
      <div class="quiz-actions" id="quizActions">
        <button class="btn btn-primary" id="checkBtn">Перевірити</button>
        <button class="btn" id="skipBtn">Не знаю</button>
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-value success">${quizState.correct}</div><div class="stat-label">правильно</div></div>
        <div class="stat"><div class="stat-value error">${quizState.incorrect}</div><div class="stat-label">помилок</div></div>
        <div class="stat"><div class="stat-value">${totalQ - quizState.current}</div><div class="stat-label">залишилось</div></div>
      </div>
    </div>
  `;
  const input = document.getElementById('quizInput');
  input.focus();
  const announce = `${q.verb.inf}... ${PRONOUNS_SPEAK[q.person]}`;
  const speaker = document.getElementById('perfQuizSpeaker');
  attachSpeakHandler(speaker, announce);
  if (soundEnabled) {
    setTimeout(() => { speaker.classList.add('playing'); speak(announce, { onend: () => speaker.classList.remove('playing') }); }, voicesReady ? 200 : 500);
  }
  document.getElementById('checkBtn').addEventListener('click', checkPerfectoAnswer);
  document.getElementById('skipBtn').addEventListener('click', skipPerfectoAnswer);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') { if (quizState.showingFeedback) nextPerfectoQuestion(); else checkPerfectoAnswer(); } });
}

function checkPerfectoAnswer() {
  if (quizState.showingFeedback) { nextPerfectoQuestion(); return; }
  const q = quizState.questions[quizState.current];
  const expected = q.expected;
  const input = document.getElementById('quizInput');
  const answer = input.value;
  if (!answer.trim()) return;
  const result = isCorrectAnswer(answer, expected);
  const feedback = document.getElementById('quizFeedback');
  quizState.showingFeedback = true;
  if (result === 'perfect' || result === 'no-accent') {
    quizState.correct++;
    input.classList.add('correct');
    feedback.className = 'quiz-feedback correct';
    feedback.innerHTML = `¡Perfecto! <strong>${expected}</strong> ✓`;
  } else {
    quizState.incorrect++;
    quizState.mistakes.push(q);
    input.classList.add('incorrect');
    feedback.className = 'quiz-feedback incorrect';
    const note = q.verb.note || `Правильне participio: ${q.verb.part}`;
    feedback.innerHTML = `Правильно: <strong>${expected}</strong>. ${note}`;
  }
  const speakText = `${PRONOUNS_SPEAK[q.person]} ${expected}`;
  setTimeout(() => speak(speakText, { rate: 0.8 }), 300);
  document.getElementById('quizActions').innerHTML = `<button class="btn btn-primary" id="nextBtn">${quizState.current + 1 >= quizState.questions.length ? 'Результат' : 'Далі →'}</button>`;
  document.getElementById('nextBtn').addEventListener('click', nextPerfectoQuestion);
}

function skipPerfectoAnswer() {
  const q = quizState.questions[quizState.current];
  quizState.incorrect++;
  quizState.mistakes.push(q);
  quizState.showingFeedback = true;
  const feedback = document.getElementById('quizFeedback');
  feedback.className = 'quiz-feedback incorrect';
  const note = q.verb.note || `Правильне participio: ${q.verb.part}`;
  feedback.innerHTML = `Правильно: <strong>${q.expected}</strong>. ${note}`;
  document.getElementById('quizInput').classList.add('incorrect');
  const speakText = `${PRONOUNS_SPEAK[q.person]} ${q.expected}`;
  setTimeout(() => speak(speakText, { rate: 0.8 }), 300);
  document.getElementById('quizActions').innerHTML = `<button class="btn btn-primary" id="nextBtn">${quizState.current + 1 >= quizState.questions.length ? 'Результат' : 'Далі →'}</button>`;
  document.getElementById('nextBtn').addEventListener('click', nextPerfectoQuestion);
}

function nextPerfectoQuestion() {
  quizState.current++;
  quizState.showingFeedback = false;
  if (quizState.current >= quizState.questions.length) showPerfectoResults();
  else renderPerfectoQuestion();
}

function showPerfectoResults() {
  showGenericResults({
    renderQuestion: renderPerfectoQuestion,
    renderSetup: () => renderPerfectoSetup(document.getElementById('trainerContent')),
    startQuiz: startPerfectoQuiz,
    formatMistake: m => `<div class="mistake-chip"><span class="mc-pronoun">${PRONOUNS[m.person]}</span><span class="mc-form">${m.expected}</span></div>`,
    mistakeKey: m => `${m.verb.inf}-${m.person}`
  });
}

// Generic results renderer for trainers that follow the same pattern
function showGenericResults(opts) {
  const totalQ = quizState.questions.length;
  const pct = Math.round((quizState.correct / totalQ) * 100);
  const hasMistakes = quizState.mistakes.length > 0;
  const isReview = quizState.reviewMode;
  let emoji, title, subtitle;
  if (isReview && !hasMistakes) { emoji = '🌹'; title = '¡Lo lograste!'; subtitle = 'Усі помилки виправлені — ти запам\'ятала їх назавжди'; }
  else if (isReview && hasMistakes) { emoji = '🔄'; title = `Раунд ${quizState.reviewRound}`; subtitle = `Ще ${quizState.mistakes.length} ${pluralize(quizState.mistakes.length, 'питання', 'питання', 'питань')} потребують уваги`; }
  else if (pct === 100) { emoji = '🌹'; title = '¡Magnífico!'; subtitle = 'Бездоганно!'; }
  else if (pct >= 80) { emoji = '✨'; title = '¡Muy bien!'; subtitle = 'Майже ідеально — продовжуй!'; }
  else if (pct >= 60) { emoji = '🍷'; title = '¡Bien hecho!'; subtitle = 'Гарний результат'; }
  else if (pct >= 40) { emoji = '📖'; title = 'Sigue practicando'; subtitle = 'Повернись до теорії'; }
  else { emoji = '🌱'; title = 'Empieza de nuevo'; subtitle = 'Не здавайся!'; }
  let actions = hasMistakes
    ? `<button class="btn btn-primary" id="reviewBtn">${isReview ? `Повторити ще раз (${quizState.mistakes.length})` : `Заучити помилки (${quizState.mistakes.length}) →`}</button><button class="btn" id="restartBtn">Нова сесія</button>`
    : `<button class="btn btn-primary" id="restartBtn">Ще раз</button><button class="btn" id="backBtn2">Налаштування</button>`;
  let mistakesList = '';
  if (hasMistakes) {
    const unique = {};
    quizState.mistakes.forEach(m => { unique[opts.mistakeKey(m)] = m; });
    const items = Object.values(unique).slice(0, 8);
    mistakesList = `<div class="mistakes-preview"><div class="mistakes-title">${isReview ? 'Залишилось закріпити:' : 'Над чим попрацюємо:'}</div><div class="mistakes-chips">${items.map(opts.formatMistake).join('')}${Object.values(unique).length > 8 ? `<div class="mistake-chip more">+ ${Object.values(unique).length - 8}</div>` : ''}</div></div>`;
  }
  document.getElementById('trainerContent').innerHTML = `
    <div class="results">
      <div class="results-emoji">${emoji}</div>
      <div class="results-title">${title}</div>
      <div class="results-subtitle">${subtitle}</div>
      ${!isReview || (isReview && !hasMistakes) ? `<div class="results-score">${pct}%</div><div class="results-score-label">${quizState.correct} з ${totalQ} правильно${isReview ? ` · раунд ${quizState.reviewRound}` : ''}</div>` :
        `<div style="margin:24px 0;"><div style="font-family:'Cormorant Garamond',serif;font-size:3rem;font-weight:600;color:var(--olive);">${quizState.correct}<span style="color:var(--ink-soft);font-size:1.5rem;"> / ${totalQ}</span></div><div style="font-family:'Caveat',cursive;font-size:1.2rem;color:var(--ink-soft);margin-top:4px;">виправлено цього раунду</div></div>`}
      ${mistakesList}
      <div class="quiz-actions">${actions}</div>
    </div>`;
  if (hasMistakes) {
    document.getElementById('reviewBtn').addEventListener('click', () => startReviewQuiz(opts.renderQuestion));
    document.getElementById('restartBtn').addEventListener('click', opts.renderSetup);
  } else {
    document.getElementById('restartBtn').addEventListener('click', opts.startQuiz);
    document.getElementById('backBtn2').addEventListener('click', opts.renderSetup);
  }
}

function startGerundioQuiz() {
  const groups = Array.from(document.querySelectorAll('#gerGroupFilters .filter-option.active')).map(b => b.dataset.group);

  const filtered = GERUNDIO_VERBS.filter(v => groups.includes(v.group));
  const questions = filtered.map(v => ({ verb: v, expected: v.form }));
  initQuizState(questions);
  renderGerundioQuestion();
}

function renderGerundioQuestion() {
  const q = quizState.questions[quizState.current];
  const totalQ = quizState.questions.length;
  const progress = (quizState.current / totalQ) * 100;
  document.getElementById('trainerContent').innerHTML = `
    <div class="quiz-card">
      ${quizState.reviewMode ? `<div class="review-badge">⟲ Раунд повторення ${quizState.reviewRound}</div>` : ''}

      </div>

      <div class="quiz-verb-row">
        <div class="quiz-verb">${q.verb.inf}</div>
        <button class="speaker-btn speaker-btn-large" id="gerQuizSpeaker">${SPEAKER_SVG}</button>
      </div>

        <div class="stat"><div class="stat-value error">${quizState.incorrect}</div><div class="stat-label">помилок</div></div>
        <div class="stat"><div class="stat-value">${totalQ - quizState.current}</div><div class="stat-label">залишилось</div></div>
      </div>
    </div>
  `;
  const input = document.getElementById('quizInput');
  input.focus();
  const speaker = document.getElementById('gerQuizSpeaker');
  attachSpeakHandler(speaker, q.verb.inf);
  if (soundEnabled) {
    setTimeout(() => { speaker.classList.add('playing'); speak(q.verb.inf, { onend: () => speaker.classList.remove('playing') }); }, voicesReady ? 200 : 500);
  }
  document.getElementById('checkBtn').addEventListener('click', checkGerundioAnswer);
  document.getElementById('skipBtn').addEventListener('click', skipGerundioAnswer);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') { if (quizState.showingFeedback) nextGerundioQuestion(); else checkGerundioAnswer(); } });
}

function checkGerundioAnswer() {
  if (quizState.showingFeedback) { nextGerundioQuestion(); return; }
  const q = quizState.questions[quizState.current];
  const input = document.getElementById('quizInput');
  const answer = input.value;
  if (!answer.trim()) return;
  const result = isCorrectAnswer(answer, q.expected);
  const feedback = document.getElementById('quizFeedback');
  quizState.showingFeedback = true;
  if (result === 'perfect' || result === 'no-accent') {
    quizState.correct++;
    input.classList.add('correct');
    feedback.className = 'quiz-feedback correct';
    feedback.innerHTML = `¡Perfecto! <strong>${q.expected}</strong> ✓`;
  } else {
    quizState.incorrect++;
    quizState.mistakes.push(q);
    input.classList.add('incorrect');
    feedback.className = 'quiz-feedback incorrect';
    feedback.innerHTML = `Правильно: <strong>${q.expected}</strong>. ${q.verb.note || 'Правильне утворення -ando/-iendo'}`;
  }
  setTimeout(() => speak(q.expected, { rate: 0.8 }), 300);
  document.getElementById('quizActions').innerHTML = `<button class="btn btn-primary" id="nextBtn">${quizState.current + 1 >= quizState.questions.length ? 'Результат' : 'Далі →'}</button>`;
  document.getElementById('nextBtn').addEventListener('click', nextGerundioQuestion);
}

function skipGerundioAnswer() {
  const q = quizState.questions[quizState.current];
  quizState.incorrect++;
  quizState.mistakes.push(q);
  quizState.showingFeedback = true;
  const feedback = document.getElementById('quizFeedback');
  feedback.className = 'quiz-feedback incorrect';
  feedback.innerHTML = `Правильно: <strong>${q.expected}</strong>. ${q.verb.note || 'Правильне утворення -ando/-iendo'}`;
  document.getElementById('quizInput').classList.add('incorrect');
  setTimeout(() => speak(q.expected, { rate: 0.8 }), 300);
  document.getElementById('quizActions').innerHTML = `<button class="btn btn-primary" id="nextBtn">${quizState.current + 1 >= quizState.questions.length ? 'Результат' : 'Далі →'}</button>`;
  document.getElementById('nextBtn').addEventListener('click', nextGerundioQuestion);
}

function nextGerundioQuestion() {
  quizState.current++;
  quizState.showingFeedback = false;
  if (quizState.current >= quizState.questions.length) showGerundioResults();
  else renderGerundioQuestion();
}

function showGerundioResults() {
  showGenericResults({
    renderQuestion: renderGerundioQuestion,
    renderSetup: () => renderGerundioSetup(document.getElementById('trainerContent')),
    startQuiz: startGerundioQuiz,
    formatMistake: m => `<div class="mistake-chip"><span class="mc-pronoun">${m.verb.inf}</span><span class="mc-form">${m.expected}</span></div>`,
    mistakeKey: m => m.verb.inf
  });
}

  let inputArea = '';
  if (q.quizMode === 'multiple') {
    inputArea = `
      <div class="choice-grid">
        ${shuffle(q.options).map(opt => `<button class="choice-btn" data-choice="${opt}">${opt}</button>`).join('')}
      </div>
    `;
  } else {
    inputArea = `
      <div><input type="text" id="quizInput" class="quiz-input" placeholder="desde / hace / desde hace" autocomplete="off" autocapitalize="off" spellcheck="false" style="font-size:1.2rem;"></div>
    `;
  }
  document.getElementById('trainerContent').innerHTML = `
    <div class="quiz-card">
      ${quizState.reviewMode ? `<div class="review-badge">⟲ Раунд повторення ${quizState.reviewRound}</div>` : ''}
      <div class="quiz-progress">
        <span>${quizState.current + 1}/${totalQ}</span>
        <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
        <span style="color:var(--olive);">✓ ${quizState.correct}</span>
      </div>
      <div class="quiz-prompt">встав правильне слово</div>
      <div class="quiz-sentence">${sentenceWithBlank}</div>
      <div class="quiz-hint">~ ${q.uk} ~</div>
      ${inputArea}
      <div class="quiz-feedback" id="quizFeedback"></div>
      <div class="quiz-actions" id="quizActions">
        ${q.quizMode === 'fill' ? `<button class="btn btn-primary" id="checkBtn">Перевірити</button><button class="btn" id="skipBtn">Не знаю</button>` : `<button class="btn" id="skipBtn">Не знаю</button>`}
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-value success">${quizState.correct}</div><div class="stat-label">правильно</div></div>
        <div class="stat"><div class="stat-value error">${quizState.incorrect}</div><div class="stat-label">помилок</div></div>
        <div class="stat"><div class="stat-value">${totalQ - quizState.current}</div><div class="stat-label">залишилось</div></div>
      </div>
    </div>
  `;
  if (q.quizMode === 'multiple') {
    document.querySelectorAll('.choice-btn').forEach(btn => {
      btn.addEventListener('click', () => handleDuracionChoice(btn.dataset.choice, btn));
    });
  } else {
    const input = document.getElementById('quizInput');
    input.focus();
    document.getElementById('checkBtn').addEventListener('click', checkDuracionAnswer);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') { if (quizState.showingFeedback) nextDuracionQuestion(); else checkDuracionAnswer(); } });
  }
  document.getElementById('skipBtn').addEventListener('click', skipDuracionAnswer);
  // Speak the sentence (replace blank with answer? no — read with pause for blank)
  if (soundEnabled) {
    const readText = q.sentence.replace('___', '... mmm ...');
    setTimeout(() => speak(readText, { rate: 0.85 }), voicesReady ? 200 : 500);
  }
}

function handleDuracionChoice(choice, btn) {
  if (quizState.showingFeedback) return;
  const q = quizState.questions[quizState.current];
  const feedback = document.getElementById('quizFeedback');
  quizState.showingFeedback = true;
  const buttons = document.querySelectorAll('.choice-btn');
  buttons.forEach(b => { b.disabled = true; if (b.dataset.choice === q.answer) b.classList.add('correct'); });
  if (choice === q.answer) {
    quizState.correct++;
    feedback.className = 'quiz-feedback correct';
    feedback.innerHTML = `¡Perfecto! <strong>${q.answer}</strong> ✓ <br><span style="font-style:normal;font-family:'Manrope',sans-serif;font-size:0.9rem;color:var(--ink-soft);">${q.explanation}</span>`;
  } else {
    quizState.incorrect++;
    quizState.mistakes.push(q);
    btn.classList.add('incorrect');
    feedback.className = 'quiz-feedback incorrect';
    feedback.innerHTML = `Правильно: <strong>${q.answer}</strong>. <br><span style="font-style:normal;font-family:'Manrope',sans-serif;font-size:0.9rem;color:var(--ink-soft);">${q.explanation}</span>`;
  }
  setTimeout(() => speak(q.sentence.replace('___', q.answer), { rate: 0.85 }), 300);
  document.getElementById('quizActions').innerHTML = `<button class="btn btn-primary" id="nextBtn">${quizState.current + 1 >= quizState.questions.length ? 'Результат' : 'Далі →'}</button>`;
  document.getElementById('nextBtn').addEventListener('click', nextDuracionQuestion);
}

function checkDuracionAnswer() {
  if (quizState.showingFeedback) { nextDuracionQuestion(); return; }
  const q = quizState.questions[quizState.current];
  const input = document.getElementById('quizInput');
  const answer = input.value;
  if (!answer.trim()) return;
  const result = isCorrectAnswer(answer, q.answer);
  const feedback = document.getElementById('quizFeedback');
  quizState.showingFeedback = true;
  if (result === 'perfect' || result === 'no-accent') {
    quizState.correct++;
    input.classList.add('correct');
    feedback.className = 'quiz-feedback correct';
    feedback.innerHTML = `¡Perfecto! <strong>${q.answer}</strong> ✓ <br><span style="font-style:normal;font-family:'Manrope',sans-serif;font-size:0.9rem;color:var(--ink-soft);">${q.explanation}</span>`;
  } else {
    quizState.incorrect++;
    quizState.mistakes.push(q);
    input.classList.add('incorrect');
    feedback.className = 'quiz-feedback incorrect';
    feedback.innerHTML = `Правильно: <strong>${q.answer}</strong>. <br><span style="font-style:normal;font-family:'Manrope',sans-serif;font-size:0.9rem;color:var(--ink-soft);">${q.explanation}</span>`;
  }
  setTimeout(() => speak(q.sentence.replace('___', q.answer), { rate: 0.85 }), 300);
  document.getElementById('quizActions').innerHTML = `<button class="btn btn-primary" id="nextBtn">${quizState.current + 1 >= quizState.questions.length ? 'Результат' : 'Далі →'}</button>`;
  document.getElementById('nextBtn').addEventListener('click', nextDuracionQuestion);
}

function skipDuracionAnswer() {
  const q = quizState.questions[quizState.current];
  if (quizState.showingFeedback) return;
  quizState.incorrect++;
  quizState.mistakes.push(q);
  quizState.showingFeedback = true;
  const feedback = document.getElementById('quizFeedback');
  feedback.className = 'quiz-feedback incorrect';
  feedback.innerHTML = `Правильно: <strong>${q.answer}</strong>. <br><span style="font-style:normal;font-family:'Manrope',sans-serif;font-size:0.9rem;color:var(--ink-soft);">${q.explanation}</span>`;
  const input = document.getElementById('quizInput');
  if (input) input.classList.add('incorrect');
  document.querySelectorAll('.choice-btn').forEach(b => { b.disabled = true; if (b.dataset.choice === q.answer) b.classList.add('correct'); });
  setTimeout(() => speak(q.sentence.replace('___', q.answer), { rate: 0.85 }), 300);
  document.getElementById('quizActions').innerHTML = `<button class="btn btn-primary" id="nextBtn">${quizState.current + 1 >= quizState.questions.length ? 'Результат' : 'Далі →'}</button>`;
  document.getElementById('nextBtn').addEventListener('click', nextDuracionQuestion);
}

function nextDuracionQuestion() {
  quizState.current++;
  quizState.showingFeedback = false;
  if (quizState.current >= quizState.questions.length) showDuracionResults();
  else renderDuracionQuestion();
}

function showDuracionResults() {
  showGenericResults({
    renderQuestion: renderDuracionQuestion,
    renderSetup: () => renderDuracionSetup(document.getElementById('trainerContent')),
    startQuiz: startDuracionQuiz,
    formatMistake: m => `<div class="mistake-chip"><span class="mc-form">${m.answer}</span></div>`,
    mistakeKey: m => m.sentence
  });
}

function startComplementosQuiz() {
  const types = Array.from(document.querySelectorAll('#compTypeFilters .filter-option.active')).map(b => b.dataset.type);
  const mode = document.querySelector('#compModeFilters .filter-option.active').dataset.mode;
  if (types.length === 0) { alert('Обери хоча б один тип додатка.'); return; }
  const filtered = COMPLEMENTOS_QUESTIONS.filter(q => types.includes(q.type));
  if (filtered.length === 0) { alert('Немає питань для обраних типів.'); return; }
  const questions = shuffle(filtered).map(q => ({
    ...q,
    quizMode: mode === 'mixed' ? (Math.random() < 0.5 ? 'multiple' : 'fill') : mode
  }));
  initQuizState(questions, { limit: 15 });
  renderComplementosQuestion();
}

        <span style="color:var(--olive);">✓ ${quizState.correct}</span>
      </div>
      <div class="quiz-prompt">встав займенник</div>
      <div class="quiz-sentence">${sentenceWithBlank}</div>
      <div class="quiz-hint">~ ${q.uk} ~</div>
      ${inputArea}
      <div class="quiz-feedback" id="quizFeedback"></div>
      <div class="quiz-actions" id="quizActions">
        ${q.quizMode === 'fill' ? `<button class="btn btn-primary" id="checkBtn">Перевірити</button><button class="btn" id="skipBtn">Не знаю</button>` : `<button class="btn" id="skipBtn">Не знаю</button>`}
      </div>
      <div class="stats">
        <div class="stat"><div class="stat-value success">${quizState.correct}</div><div class="stat-label">правильно</div></div>
        <div class="stat"><div class="stat-value error">${quizState.incorrect}</div><div class="stat-label">помилок</div></div>
        <div class="stat"><div class="stat-value">${totalQ - quizState.current}</div><div class="stat-label">залишилось</div></div>
      </div>
    </div>
  `;
  if (q.quizMode === 'multiple') {
    document.querySelectorAll('.choice-btn').forEach(btn => {
      btn.addEventListener('click', () => handleComplementosChoice(btn.dataset.choice, btn));
    });
  } else {
    const input = document.getElementById('quizInput');
    input.focus();
    document.getElementById('checkBtn').addEventListener('click', checkComplementosAnswer);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') { if (quizState.showingFeedback) nextComplementosQuestion(); else checkComplementosAnswer(); } });
  }
  document.getElementById('skipBtn').addEventListener('click', skipComplementosAnswer);
}

function handleComplementosChoice(choice, btn) {
  if (quizState.showingFeedback) return;
  const q = quizState.questions[quizState.current];
  const feedback = document.getElementById('quizFeedback');
  quizState.showingFeedback = true;
  const buttons = document.querySelectorAll('.choice-btn');
  buttons.forEach(b => { b.disabled = true; if (b.dataset.choice === q.answer) b.classList.add('correct'); });
  if (choice === q.answer) {
    quizState.correct++;
    feedback.className = 'quiz-feedback correct';
    feedback.innerHTML = `¡Perfecto! <strong>${q.answer}</strong> ✓ <br><span style="font-style:normal;font-family:'Manrope',sans-serif;font-size:0.9rem;color:var(--ink-soft);">${q.explanation}</span>`;
  } else {
    quizState.incorrect++;
    quizState.mistakes.push(q);
    btn.classList.add('incorrect');
    feedback.className = 'quiz-feedback incorrect';
    feedback.innerHTML = `Правильно: <strong>${q.answer}</strong>. <br><span style="font-style:normal;font-family:'Manrope',sans-serif;font-size:0.9rem;color:var(--ink-soft);">${q.explanation}</span>`;
  }
  // Speak the full corrected sentence
  const correctedSentence = q.type === 'combo' ? q.sentence.replace('___ ___', q.answer) : q.sentence.replace('___', q.answer);
  setTimeout(() => speak(correctedSentence.replace('→', '...'), { rate: 0.85 }), 300);
  document.getElementById('quizActions').innerHTML = `<button class="btn btn-primary" id="nextBtn">${quizState.current + 1 >= quizState.questions.length ? 'Результат' : 'Далі →'}</button>`;
  document.getElementById('nextBtn').addEventListener('click', nextComplementosQuestion);
}

function checkComplementosAnswer() {
  if (quizState.showingFeedback) { nextComplementosQuestion(); return; }
  const q = quizState.questions[quizState.current];
  const input = document.getElementById('quizInput');
  const answer = input.value;
  if (!answer.trim()) return;
  const result = isCorrectAnswer(answer, q.answer);
  const feedback = document.getElementById('quizFeedback');
  quizState.showingFeedback = true;
  if (result === 'perfect' || result === 'no-accent') {
    quizState.correct++;
    input.classList.add('correct');
    feedback.className = 'quiz-feedback correct';
    feedback.innerHTML = `¡Perfecto! <strong>${q.answer}</strong> ✓ <br><span style="font-style:normal;font-family:'Manrope',sans-serif;font-size:0.9rem;color:var(--ink-soft);">${q.explanation}</span>`;
  } else {
    quizState.incorrect++;
    quizState.mistakes.push(q);
    input.classList.add('incorrect');
    feedback.className = 'quiz-feedback incorrect';
    feedback.innerHTML = `Правильно: <strong>${q.answer}</strong>. <br><span style="font-style:normal;font-family:'Manrope',sans-serif;font-size:0.9rem;color:var(--ink-soft);">${q.explanation}</span>`;
  }
  const correctedSentence = q.type === 'combo' ? q.sentence.replace('___ ___', q.answer) : q.sentence.replace('___', q.answer);
  setTimeout(() => speak(correctedSentence.replace('→', '...'), { rate: 0.85 }), 300);
  document.getElementById('quizActions').innerHTML = `<button class="btn btn-primary" id="nextBtn">${quizState.current + 1 >= quizState.questions.length ? 'Результат' : 'Далі →'}</button>`;
  document.getElementById('nextBtn').addEventListener('click', nextComplementosQuestion);
}

function skipComplementosAnswer() {
  if (quizState.showingFeedback) return;
  const q = quizState.questions[quizState.current];
  quizState.incorrect++;
  quizState.mistakes.push(q);
  quizState.showingFeedback = true;
  const feedback = document.getElementById('quizFeedback');
  feedback.className = 'quiz-feedback incorrect';
  feedback.innerHTML = `Правильно: <strong>${q.answer}</strong>. <br><span style="font-style:normal;font-family:'Manrope',sans-serif;font-size:0.9rem;color:var(--ink-soft);">${q.explanation}</span>`;
  const input = document.getElementById('quizInput');
  if (input) input.classList.add('incorrect');
  document.querySelectorAll('.choice-btn').forEach(b => { b.disabled = true; if (b.dataset.choice === q.answer) b.classList.add('correct'); });
  const correctedSentence = q.type === 'combo' ? q.sentence.replace('___ ___', q.answer) : q.sentence.replace('___', q.answer);
  setTimeout(() => speak(correctedSentence.replace('→', '...'), { rate: 0.85 }), 300);
  document.getElementById('quizActions').innerHTML = `<button class="btn btn-primary" id="nextBtn">${quizState.current + 1 >= quizState.questions.length ? 'Результат' : 'Далі →'}</button>`;
  document.getElementById('nextBtn').addEventListener('click', nextComplementosQuestion);
}

function nextComplementosQuestion() {
  quizState.current++;
  quizState.showingFeedback = false;
  if (quizState.current >= quizState.questions.length) showComplementosResults();
  else renderComplementosQuestion();
}

function showComplementosResults() {
  showGenericResults({
    renderQuestion: renderComplementosQuestion,
    renderSetup: () => renderComplementosSetup(document.getElementById('trainerContent')),
    startQuiz: startComplementosQuiz,
    formatMistake: m => `<div class="mistake-chip"><span class="mc-form">${m.answer}</span></div>`,
    mistakeKey: m => m.sentence
  });
}

function renderComplementosReference(root) {
  root.innerHTML = `
    <div class="reference-intro">
      <h2>Complementos OD / OI</h2>
      <p>Займенники, що замінюють прямий і непрямий додаток. Найскладніше для початківців — але без них не обійтись.</p>
    </div>
    <div class="reference-section">
      <h3 class="ref-section-title"><span class="num">i.</span>Що таке OD і OI?</h3>
      <p class="ref-text"><strong>OD (objeto directo)</strong> — прямий додаток. Питання: <i>кого? що?</i></p>
      <p class="ref-text"><strong>OI (objeto indirecto)</strong> — непрямий додаток. Питання: <i>кому? чому?</i></p>
      <div class="example-box"><div class="es">Doy <b style="color:var(--olive);">el libro</b> <b style="color:var(--terracotta);">a Juan</b>.</div><div class="uk"><span style="color:var(--olive);">Книжку</span> (що? — OD) даю <span style="color:var(--terracotta);">Хуану</span> (кому? — OI).</div></div>
    </div>
    <div class="reference-section">
      <h3 class="ref-section-title"><span class="num">ii.</span>Таблиця займенників</h3>
      <table class="endings-table">
        <thead><tr><th>Особа</th><th>OD (кого/що)</th><th>OI (кому)</th></tr></thead>
        <tbody>
          <tr><td><i>я → мене / мені</i></td><td class="ending">me</td><td class="ending">me</td></tr>
          <tr><td><i>ти → тебе / тобі</i></td><td class="ending">te</td><td class="ending">te</td></tr>
          <tr><td><i>він → його / йому</i></td><td class="ending">lo</td><td class="ending">le</td></tr>
          <tr><td><i>вона → її / їй</i></td><td class="ending">la</td><td class="ending">le</td></tr>
          <tr><td><i>ми → нас / нам</i></td><td class="ending">nos</td><td class="ending">nos</td></tr>
          <tr><td><i>ви → вас / вам</i></td><td class="ending">os</td><td class="ending">os</td></tr>
          <tr><td><i>вони (чол.) → їх / їм</i></td><td class="ending">los</td><td class="ending">les</td></tr>
          <tr><td><i>вони (жін.) → їх / їм</i></td><td class="ending">las</td><td class="ending">les</td></tr>
        </tbody>
      </table>
      <p class="ref-text"><strong>Зверни увагу:</strong> me, te, nos, os — однакові для OD і OI. Різниця тільки у 3-й особі!</p>
    </div>
    <div class="reference-section">
      <h3 class="ref-section-title"><span class="num">iii.</span>Місце займенника</h3>
      <p class="ref-text"><strong>Перед</strong> відмінюваним дієсловом:</p>
      <div class="example-box"><div class="es"><b>La</b> veo todos los días.</div><div class="uk">Я її бачу щодня.</div></div>
      <div class="example-box"><div class="es">No <b>le</b> hablo.</div><div class="uk">Я з ним не розмовляю.</div></div>
      <p class="ref-text"><strong>Після</strong> та з'єднано з інфінітивом, герундієм або наказовим способом:</p>
      <div class="example-box"><div class="es">Voy a <b>verlo</b>. = <b>Lo</b> voy a ver.</div><div class="uk">Я збираюся його побачити.</div></div>
      <div class="example-box"><div class="es">Estoy <b>llamándola</b>. = <b>La</b> estoy llamando.</div><div class="uk">Я її дзвоню.</div></div>
    </div>
    <div class="reference-section">
      <h3 class="ref-section-title"><span class="num">iv.</span>Найважливіше: le + lo → se lo!</h3>
      <p class="ref-text">Коли треба сказати «йому/їй (його/її)», тобто OI + OD у 3-й особі — <strong>le/les змінюється на se</strong>:</p>
      <table class="endings-table">
        <thead><tr><th>Було б</th><th>Стає</th></tr></thead>
        <tbody>
          <tr><td>le + lo</td><td class="ending">se lo</td></tr>
          <tr><td>le + la</td><td class="ending">se la</td></tr>
          <tr><td>le + los</td><td class="ending">se los</td></tr>
          <tr><td>le + las</td><td class="ending">se las</td></tr>
          <tr><td>les + lo/la/los/las</td><td class="ending">se lo / se la / se los / se las</td></tr>
        </tbody>
      </table>
      <div class="example-box"><div class="es">Doy el libro a Juan. → <b>Se lo</b> doy.</div><div class="uk">Я даю книжку Хуану. → Я даю йому її.</div></div>
      <div class="example-box"><div class="es">Compro flores a María. → <b>Se las</b> compro.</div><div class="uk">Я купую квіти Марії. → Я купую їх їй.</div></div>
      <p class="ref-text" style="color:var(--terracotta);"><strong>Правило просте:</strong> le + lo = НЕ говорять. Тільки <strong>se lo</strong>!</p>
    </div>
    <div class="reference-section">
      <h3 class="ref-section-title"><span class="num">v.</span>Порядок: спочатку OI, потім OD</h3>
      <p class="ref-text">Коли є обидва займенники — <strong>OI завжди ПЕРШИЙ</strong>:</p>
      <div class="example-box"><div class="es"><b style="color:var(--terracotta);">Me</b> <b style="color:var(--olive);">lo</b> dijiste ayer.</div><div class="uk">Ти мені <span style="color:var(--terracotta);">(OI)</span> це <span style="color:var(--olive);">(OD)</span> сказав учора.</div></div>
      <div class="example-box"><div class="es"><b style="color:var(--terracotta);">Te</b> <b style="color:var(--olive);">la</b> regalo.</div><div class="uk">Я тобі <span style="color:var(--terracotta);">(OI)</span> її <span style="color:var(--olive);">(OD)</span> дарую.</div></div>
    </div>
  `;
}
